name: .Net_Core_CI


on: 
  push:
    branches: ["test"]
  pull_request:
    branches: ["test"]

permissions: 
  pull-requests: write # cho phép nó comment vào pull request để báo lỗi nếu có


defaults:
  run:
    working-directory: ./src/MyAppTest

jobs:
  build_and_test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout ma nguon 
        uses: actions/checkout@v4

# check conbot 
      - name: Comment tin vao pr
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with: 
          script: |
            github.rest.issues.createComment({
              issue_number: context.payload.pull_request.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: "Xin chào, mình là bot tự động build và test code .NET Core. Mình sẽ chạy build và test code của bạn ngay bây giờ."
            })

      # cai dạt moi trường .net sdk  vào máy ảo 
      # day là action chính chủ từ ms để setup .NET cực nhanh
      - name: Cai dat .NET Core SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0' # cáu hình version của .NET Core SDK mà mình muốn dùng, có thể là 3.1, 5.0, 6.0, 7.0, 8.0

      # khoi phuc cac thu vien nuget
      - name: Restore nuget packages
        run: dotnet restore

      - name: Bien dich ma nguon (build)
        run: dotnet build --no-restore --configuration Release


      # tự động xuất file sản phẩm hoàn chỉnh 
      # lệnh này sẽ xuất file chạy ra một thư mục riêng tên publish_output
      - name: Xuat ban ung dung 
        run: dotnet publish --no-build --configuration Release --output ./publish_output


      # day san pham len giao dien web
      - name: luu tru file chay ung dung 
        uses: actions/upload-artifact@v4
        with:
          name: Console_App_Hoan_Chinh # tên file zip hiển thị trên giao dienj để tải 
          path: ./src/MyAppTest/publish_output/ # đường dẫn tới thư mục chứa file chạy hoàn chỉnh mà mình muốn upload lên github
      # chạy automation test
      # - name: Chay unit test
      #   run: dotnet test --no-build --verbosity normal